{% extends 'base.html' %}

{% block title %}Новый преподаватель{% endblock %}

{% block content %}
<div class="card">
    <h1>Добавить нового преподавателя</h1>
    
    <p><a href="/admin-panel/" class="nav-link">← Назад в панель администратора</a></p>

    <form method="post">
        {% csrf_token %}
        
        <label style="display:block; margin:15px 0 5px; font-weight:bold;">Учебное заведение</label>
        <select name="institution" required style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:6px;">
            {% for inst in institutions %}
            <option value="{{ inst.id }}">{{ inst.name }}</option>
            {% endfor %}
        </select>

        <label style="display:block; margin:15px 0 5px; font-weight:bold;">Логин (username)</label>
        <input type="text" name="username" required style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:6px;">

        <label style="display:block; margin:15px 0 5px; font-weight:bold;">Пароль</label>
        <input type="password" name="password" required style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:6px;">

        <label style="display:block; margin:15px 0 5px; font-weight:bold;">Фамилия</label>
        <input type="text" name="last_name" required style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:6px;">

        <label style="display:block; margin:15px 0 5px; font-weight:bold;">Имя</label>
        <input type="text" name="first_name" required style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:6px;">

        <label style="display:block; margin:15px 0 5px; font-weight:bold;">Отчество</label>
        <input type="text" name="middle_name" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:6px;">

        <label style="display:block; margin:15px 0 5px; font-weight:bold;">Телефон</label>
        <input type="text" name="phone" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:6px;">

        <button type="submit" class="btn btn-green">Создать преподавателя</button>
    </form>
</div>
{% endblock %}
