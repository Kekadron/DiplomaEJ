{% extends 'base.html' %}

{% block title %}Новое учебное заведение{% endblock %}

{% block content %}
    <h1>Создать новое учебное заведение</h1>
    
    <p><a href="/admin-panel/" style="color:#007bff; text-decoration:none;">← Назад в панель администратора</a></p>

    <form method="post" style="max-width:600px; background:white; padding:30px; border-radius:10px; margin-top:20px;">
        {% csrf_token %}
        
        <label style="display:block; margin:15px 0 5px; font-weight:bold;">Полное название</label>
        <input type="text" name="name" required style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:6px;">

        <label style="display:block; margin:15px 0 5px; font-weight:bold;">Короткое название</label>
        <input type="text" name="short_name" required style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:6px;">

        <label style="display:block; margin:15px 0 5px; font-weight:bold;">Адрес</label>
        <textarea name="address" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:6px; height:80px;"></textarea>

        <label style="display:block; margin:15px 0 5px; font-weight:bold;">Директор</label>
        <input type="text" name="director" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:6px;">

        <button type="submit" style="padding:14px 30px; background:#28a745; color:white; border:none; border-radius:8px; font-size:16px;">
            Создать учебное заведение
        </button>
    </form>
{% endblock %}
