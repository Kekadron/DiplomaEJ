{% extends 'base.html' %}

{% block title %}Создать дисциплину{% endblock %}

{% block content %}
    <div class="card">
    <h2>Создать дисциплину</h2>
    <form method="post">
        {% csrf_token %}
        <label style="display:block; margin:15px 0 5px; font-weight:bold;">Название</label>
        <input type="text" name="name" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:6px;">

        <label style="display:block; margin:15px 0 5px; font-weight:bold;">Код дисциплины</label>
        <input type="text" name="code" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:6px;">
        <button type="submit" class="btn btn-primary">Создать</button>
    </form>
    </div>
{% endblock %}
