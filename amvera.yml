meta:
  environment: python
  toolchain:
    name: pip
    version: "3.13"
build:
  requirementsPath: requirements.txt
  # Добавляем команды миграций БД
  - python manage.py makemigrations
  - python manage.py migrate
run:
  persistenceMount: /data
  containerPort: 80
  command: gunicorn config.wsgi:application --bind 0.0.0.0:80